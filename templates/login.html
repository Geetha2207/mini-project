<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="box">
        <h2>Login</h2>

        <form method="POST">
            <input name="username" placeholder="Username" required>

        </form>

        <a href="/register">Create Account</a>
    </div>
</body>

</html>
